<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OPT & LRU Visual Simulator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 25px;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.12);
}

h1, h2 {
  text-align: center;
  color: #1d3557;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 25px;
}

input, select, button {
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #bbb;
}

button {
  background: #2a9d8f;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #21867a;
}

.info-box {
  background: #f1faee;
  padding: 15px;
  border-left: 5px solid #2a9d8f;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 17px;
}

.reference-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin: 20px 0;
}

.ref-item {
  padding: 12px 16px;
  background: #dbeafe;
  border-radius: 8px;
  font-weight: bold;
}

.active {
  background: #f4a261;
  color: white;
}

.memory {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 25px 0;
}

.frame {
  width: 100px;
  height: 90px;
  border-radius: 12px;
  background: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 32px;
  font-weight: bold;
  border: 3px solid #999;
}

.hit {
  background: #b7e4c7;
  border-color: #2d6a4f;
}

.fault {
  background: #ffc9c9;
  border-color: #d00000;
}

.replaced {
  background: #ffb703;
  border-color: #fb8500;
}

.status {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin: 15px 0;
}

.explanation {
  text-align: center;
  background: #f8f9fa;
  padding: 15px;
  border-radius: 10px;
  font-size: 17px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 25px;
}

th, td {
  border: 1px solid #ccc;
  padding: 9px;
  text-align: center;
}

th {
  background: #1d3557;
  color: white;
}

.summary {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.card {
  background: #f1faee;
  padding: 15px 25px;
  border-radius: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>Virtual Memory Management Simulator</h1>
  <h2>OPT vs LRU Page Replacement</h2>

  <div class="info-box">
    This simulator shows how the Operating System decides which page to remove from RAM when memory frames are full.
  </div>

  <div class="controls">
    <input id="referenceInput" value="1 2 3 4 5 1 2 3">
    <input id="frameInput" type="number" value="3" min="1">
    <select id="algorithm">
      <option value="LRU">LRU Algorithm</option>
      <option value="OPT">OPT Algorithm</option>
    </select>
    <button onclick="startSimulation()">Start</button>
    <button onclick="nextStep()">Next Step</button>
  </div>

  <div class="reference-row" id="referenceRow"></div>

  <div class="memory" id="memoryFrames"></div>

  <div class="status" id="statusText">Click Start to begin.</div>

  <div class="explanation" id="explanationText">
    Enter a reference string, choose an algorithm, then click Start.
  </div>

  <div class="summary">
    <div class="card">Page Faults: <span id="faultCount">0</span></div>
    <div class="card">Page Hits: <span id="hitCount">0</span></div>
  </div>

  <table id="resultTable">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<script>
let references = [];
let frames = [];
let frameCount = 0;
let currentStep = 0;
let faults = 0;
let hits = 0;
let algorithm = "";

function startSimulation() {
  references = document.getElementById("referenceInput").value.trim().split(/\s+/).map(Number);
  frameCount = parseInt(document.getElementById("frameInput").value);
  algorithm = document.getElementById("algorithm").value;

  frames = [];
  currentStep = 0;
  faults = 0;
  hits = 0;

  displayReferenceRow();
  displayFrames(null, null);
  createTableHeader();

  document.querySelector("#resultTable tbody").innerHTML = "";
  document.getElementById("faultCount").innerText = faults;
  document.getElementById("hitCount").innerText = hits;
  document.getElementById("statusText").innerText = "Simulation started.";
  document.getElementById("explanationText").innerText =
    "Click Next Step to process each page request one by one.";
}

function nextStep() {
  if (currentStep >= references.length) {
    document.getElementById("statusText").innerText = "Simulation completed.";
    document.getElementById("explanationText").innerText =
      "All page requests have been processed.";
    return;
  }

  let page = references[currentStep];
  let status = "";
  let explanation = "";
  let replacedIndex = null;

  if (frames.includes(page)) {
    hits++;
    status = "Hit";
    explanation = `Page ${page} is already in RAM, so no replacement is needed.`;
  } else {
    faults++;
    status = "Fault";

    if (frames.length < frameCount) {
      frames.push(page);
      explanation = `Page ${page} is not in RAM. There is an empty frame, so it is loaded directly.`;
    } else {
      if (algorithm === "LRU") {
        replacedIndex = findLRU();
        let removedPage = frames[replacedIndex];
        frames[replacedIndex] = page;

        explanation =
          `Page ${page} causes a page fault. Using LRU, page ${removedPage} is removed because it was used least recently.`;
      } else {
        replacedIndex = findOPT();
        let removedPage = frames[replacedIndex];
        frames[replacedIndex] = page;

        explanation =
          `Page ${page} causes a page fault. Using OPT, page ${removedPage} is removed because it will be used farthest in the future.`;
      }
    }
  }

  displayReferenceRow();
  displayFrames(page, status, replacedIndex);
  addTableRow(page, status);
  updateSummary();

  document.getElementById("statusText").innerText =
    `Step ${currentStep + 1}: Page ${page} → ${status}`;

  document.getElementById("explanationText").innerText = explanation;

  currentStep++;
}

function findLRU() {
  let oldestIndex = 0;
  let oldestUse = Infinity;

  for (let i = 0; i < frames.length; i++) {
    let lastUsed = references.slice(0, currentStep).lastIndexOf(frames[i]);

    if (lastUsed < oldestUse) {
      oldestUse = lastUsed;
      oldestIndex = i;
    }
  }

  return oldestIndex;
}

function findOPT() {
  let farthestUse = -1;
  let replaceIndex = 0;

  for (let i = 0; i < frames.length; i++) {
    let nextUse = references.slice(currentStep + 1).indexOf(frames[i]);

    if (nextUse === -1) {
      return i;
    }

    if (nextUse > farthestUse) {
      farthestUse = nextUse;
      replaceIndex = i;
    }
  }

  return replaceIndex;
}

function displayReferenceRow() {
  let html = "";

  references.forEach((ref, index) => {
    html += `<div class="ref-item ${index === currentStep ? "active" : ""}">${ref}</div>`;
  });

  document.getElementById("referenceRow").innerHTML = html;
}

function displayFrames(currentPage, status, replacedIndex) {
  let html = "";

  for (let i = 0; i < frameCount; i++) {
    let value = frames[i] !== undefined ? frames[i] : "-";
    let className = "frame";

    if (status === "Hit" && value === currentPage) {
      className += " hit";
    }

    if (status === "Fault" && value === currentPage) {
      className += " fault";
    }

    if (replacedIndex === i) {
      className += " replaced";
    }

    html += `<div class="${className}">${value}</div>`;
  }

  document.getElementById("memoryFrames").innerHTML = html;
}

function createTableHeader() {
  let header = `
    <tr>
      <th>Step</th>
      <th>Page Request</th>
  `;

  for (let i = 1; i <= frameCount; i++) {
    header += `<th>Frame ${i}</th>`;
  }

  header += `<th>Status</th></tr>`;

  document.querySelector("#resultTable thead").innerHTML = header;
}

function addTableRow(page, status) {
  let row = `
    <tr>
      <td>${currentStep + 1}</td>
      <td>${page}</td>
  `;

  for (let i = 0; i < frameCount; i++) {
    row += `<td>${frames[i] !== undefined ? frames[i] : "-"}</td>`;
  }

  row += `<td>${status}</td></tr>`;

  document.querySelector("#resultTable tbody").innerHTML += row;
}

function updateSummary() {
  document.getElementById("faultCount").innerText = faults;
  document.getElementById("hitCount").innerText = hits;
}

</script>

</body>
</html>
